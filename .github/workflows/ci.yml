name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install --no-deps --no-build-isolation -e .
      - name: Run repository quality gate
        run: python scripts/check_repository.py
      - name: Smoke-test installed command
        run: market-intel search "subscription retention" --limit 1 --json
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir dist .
      - name: Smoke-test wheel outside checkout
        shell: bash
        run: |
          python -m venv /tmp/market-intel-wheel-test
          /tmp/market-intel-wheel-test/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/market-intel-wheel-test/bin/market-intel search "subscription retention" --limit 1 --json
          /tmp/market-intel-wheel-test/bin/python -c "import market_intel; assert len(market_intel.load_default_knowledge_base()) == 213"
