name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pinned build tooling
        run: python -m pip install setuptools==80.9.0
      - name: Install package
        run: python -m pip install --no-deps --no-build-isolation -e .
      - name: Run repository quality gate
        run: python scripts/check_repository.py
      - name: Smoke-test installed command
        run: market-intel search "subscription retention" --limit 1 --json
      - name: Install and smoke-test official MCP SDK
        if: matrix.python-version != '3.9'
        run: |
          python -m pip install "mcp==1.28.1"
          python tests/mcp_protocol_smoke.py
      - name: Build wheel
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir dist .
      - name: Smoke-test wheel outside checkout
        shell: bash
        run: |
          python -m venv /tmp/market-intel-wheel-test
          /tmp/market-intel-wheel-test/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/market-intel-wheel-test/bin/market-intel search "subscription retention" --limit 1 --json
          /tmp/market-intel-wheel-test/bin/python -c "import market_intel; assert market_intel.__version__ == '0.2.0'; assert len(market_intel.load_default_knowledge_base()) == 213"
          test -x /tmp/market-intel-wheel-test/bin/market-intel-mcp
